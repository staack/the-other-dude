apiVersion: v1
kind: Service
metadata:
  name: {{ include "mikrotik-portal.fullname" . }}-api
  labels:
    {{- include "mikrotik-portal.apiLabels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mikrotik-portal.apiSelectorLabels" . | nindent 4 }}
