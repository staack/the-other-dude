apiVersion: v1
kind: Service
metadata:
  name: {{ include "tod.fullname" . }}-api
  labels:
    {{- include "tod.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tod.componentSelectorLabels" (dict "context" . "component" "api") | nindent 4 }}
