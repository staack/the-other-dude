global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mikrotik-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'

  - job_name: 'mikrotik-poller'
    metrics_path: /metrics
    static_configs:
      - targets: ['poller:9091']
        labels:
          service: 'poller'
